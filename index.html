<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>PROYECTOS DE TÍTULO</title>
        <style>
            
			*,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

@import url("https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap");

:root {
    --color-oscurisimo: #718355;
    --color-oscuro: #87986a;
    --color-normal: #97a97c;
    --color-iluminado: #b5c99a;
    --color-iluminadisimo: #cfe1b9;
    --fuente: "Source Code Pro", monospace;
}

body {
    font-family: var(--fuente);
    color: var(--color-normal);
    text-align: center;
    font-size: 100%;
}

a {
    color: var(--color-oscuro);
    text-decoration: none;
}

a:hover {
    color: var(--color-oscurisimo);
    text-decoration: underline;
}
div#contenedor {
    margin: 1rem auto;
    width: 90%;
    max-width: 980px;
}

h1 {
    margin: 1rem 0;
    font-weight: 400;
    font-size: calc(100% + 3vw + 3vh);
}

h2 {
    margin: 3rem 0;
    font-weight: 400;
    letter-spacing: 0.25rem;
    font-size: calc(100% + 1vw + 1vh);
    color: var(--color-oscuro);
}

input {
    border: 0.1rem solid var(--color-iluminado);
    padding: 0.5rem 1rem;
    font-family: inherit;
    font-size: 15px;
    color: var(--color-oscuro);
    outline: none;
    margin-bottom: 1.5rem;
    width: 100%;
    display: block;
    background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="Green" class="bi bi-book" viewBox="0 0 16 16"><path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783"/></svg>');
	background-repeat: no-repeat;
    background-size: 1rem;
    background-position: 99% center;
}

input::placeholder {
    color: var(--color-iluminado);
}

input:focus {
    border-color: var(--color-normal);
}

div#contenedordetabla {
    overflow-x: auto;
    font-size: 90%;
}

table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    margin-bottom: 3rem;
}

thead {
    background: var(--color-iluminadisimo);
    color: var(--color-oscuro);
}

tbody {
    color: var(--color-normal);
}

td,
th {
    border: 1px solid var(--color-normal);
    padding: 0.75rem;
}

th:nth-child(1),
td:nth-child(1),
th:nth-child(4),
td:nth-child(4) {
    text-align: center;
}

td:nth-child(2) {
    color: var(--color-oscuro);
    font-weight: 800;
}

td:nth-child(3) {
    font-style: italic;
}
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>ฅ^>⩊<^ฅ</h1>
            <h2>PROYECTOS DE TÍTULO</h2>

            <input type="text" id="elInput" placeholder="Filtrar Títulos…" />
            <div id="contenedordetabla">
                <table>
                    <thead>
                        <tr>
                            <th>Titulad@</th>
                            <th>Proyecto</th>
                            <th>Nota</th>
                            <th>Categoría</th>
                            <th>Prof. Guía</th>
                        </tr>
                    </thead>
                    <tbody id="este"></tbody>
                </table>
            </div>
			
			<?xml version="1.0" encoding="UTF-8"?>

            <small>Diseño y visualización de información</small>
        </div>

        <script>
            const t = document.querySelector("#este");
            const URL = "https://api.myjson.online/v1/records/723e8011-d8e0-47bf-9d84-96e896e5f784";

            fetch(URL)
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })
                .then((datos) => {
                    var trabajo = datos.data;
                    console.log(trabajo);
                    trabajo.forEach((x) => {
                        t.innerHTML += `<td>${x.name}</td><td>${x.title}</td><td>${x.grade}</td><td>${x.category}</td><td>${x.tutor}</td></tr>`;
                    });
                })
                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });

            function sinAcentos(str) {
                return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            }

            document.getElementById("elInput").addEventListener("keyup", function () {
                const valor = sinAcentos(this.value.toLowerCase());
                document.querySelectorAll("#este tr").forEach(function (fila) {
                    fila.style.display = sinAcentos(fila.textContent.toLowerCase()).includes(valor) ? "" : "none";
                });
            });
        </script>
    </body>
</html>
